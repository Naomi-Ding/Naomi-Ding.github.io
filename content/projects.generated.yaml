  - slug: "bayesian-single-index-quantile-regression"
    title: "Bayesian Monotone Single-Index Quantile Regression"
    summary: "A Bayesian quantile-regression framework that combines scalar and misaligned functional covariates through a monotone single-index model, with bounded-response estimation and interpretable effects."
    related_publication_title: "Bayesian Monotone Single-Index Quantile Regression Model with Bounded Response and Misaligned Functional Covariates."
    paper_url: "https://doi.org/10.1093/biomtc/ujaf145"
    code_url: ""
    figure: "figures/bayesian-single-index-quantile-regression.png"
    figure_alt: "ERP waveform averages for losing and winning door games used in the Bayesian quantile regression study."
    figure_caption: "Averaged ERP waveforms for losing and winning door games, highlighting the reward-positivity interval used in the analysis."
