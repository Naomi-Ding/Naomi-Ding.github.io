  - slug: "connectivity-on-shape-regression"
    title: "Connectivity-on-Shape Regression in Preclinical Alzheimer's Disease"
    summary: "The COSR model links subcortical shape deformations to functional connectivity while accounting for network modularity, using Bayesian modeling and variational inference."
    related_publication_title: "A Novel Bayesian Framework Uncovering Brain Connectivity-to-Shape Relationship in Preclinical Alzheimer's Disease."
