    figure_alt: "Subcortical surfaces, radial distance maps, and connectivity matrices used in the COSR analysis."
    figure_caption: "Extracted subcortical surfaces, radial distance maps, and connectivity matrices from the A4 preclinical Alzheimer's disease analysis."
  - slug: "gradient-coupling"
    title: "Brain Functional-Structural Gradient Coupling"
    summary: "A multimodal neuroimaging study of structural-functional gradient coupling across development, with links to cognition, mental health, and genetic architecture."
    related_publication_title: "Brain Functional-Structural Gradient Coupling Reflects Development, Behavior and Genetic Influences."
    paper_url: "https://doi.org/10.1101/2025.09.16.25335918"
    code_url: ""
    figure: "figures/gradient-coupling.png"
    figure_alt: "Workflow diagram for constructing structural-functional gradient coupling from diffusion and functional MRI."
    figure_caption: "Overview of structural-functional gradient coupling construction from diffusion MRI, T1-weighted MRI, and resting-state functional MRI."
  - slug: "s-gmas"
    title: "S-GMAS"
    summary: "A genome-wide mediation pipeline that combines GWAS screening, brain-shape mediation analysis, and bootstrap inference to study brain subcortical shape mediators."
    related_publication_title: "S-GMAS: Genome-Wide Mediation Analysis With Brain Subcortical Shape Mediators."
    paper_url: "http://doi.org/10.1002/hbm.70297"
    code_url: "http://github.com/Naomi-Ding/S-GMAS"
    figure: "figures/s-gmas.png"
    figure_alt: "Path diagram linking significant SNPs, corpus callosum shape mediators, and neurocognitive outcomes."
    figure_caption: "Functional mediation diagram relating significant SNPs, corpus callosum shape mediators, clinical confounders, and neurocognitive outcomes."
  - slug: "gencpm"
    title: "GenCPM"
    summary: "An R toolbox that extends connectome-based predictive modeling to binary, categorical, and time-to-event outcomes while supporting covariate integration and regularized regression."
    related_publication_title: "GenCPM: A Toolbox for Generalized Connectome-based Predictive Modeling."
    paper_url: "https://doi.org/10.3389/fnins.2025.1627497"
    code_url: "http://github.com/BXU69/GenCPM"
