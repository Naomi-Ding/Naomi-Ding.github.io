graphical_abstracts:
  - slug: "connectivity-to-shape-preclinical-alzheimers"
    title_short: "Connectivity-on-Shape Regression"
    problem: "Preclinical Alzheimer's disease can alter subcortical shape before coarse volume loss becomes obvious."
    method: "Bayesian COSR combines feature selection, network modularity, and variational inference."
    data: "A4 participant data with vertex-level shape measures and functional connectivity."
    contribution: "Recovers interpretable structure-function associations in amyloid-positive participants."
    tags:
      - "shape analysis"
      - "functional connectivity"
      - "preclinical AD"
  - slug: "gradient-coupling-development-behavior-genetics"
    title_short: "Gradient Coupling"
    problem: "How structural and functional brain gradients couple across development remains unclear."
    method: "Multi-scale coupling metrics derived from structural and functional connectivity."
    data: "ABCD children and HCP adults with multimodal neuroimaging."
    contribution: "Shows developmental refinement and links to cognition, mental health, and genetics."
    tags:
      - "brain gradients"
      - "development"
      - "multimodal imaging"
  - slug: "bayesian-monotone-single-index-quantile-regression"
    title_short: "Bounded Quantile Regression"
    problem: "Depression-risk studies combine scalar predictors with misaligned neural response curves."
    method: "Bayesian monotone single-index quantile regression with joint functional registration."
    data: "Adolescent depression study with scalar and reward-processing covariates."
    contribution: "Keeps predictions within response bounds while modeling nonlinear combined effects."
    tags:
      - "quantile regression"
      - "functional covariates"
      - "Bayesian modeling"
  - slug: "s-gmas"
    title_short: "S-GMAS"
    problem: "Genome-wide mediation with shape mediators is hard because SNPs are massive and shapes are nonlinear."
    method: "GWAS screening plus square-root velocity function mediation and bootstrap inference."
    data: "ADNI corpus callosum imaging-genetics study."
    contribution: "Identifies both global and spatial mediation effects."
    tags:
      - "GWAS"
      - "shape mediation"
      - "ADNI"
  - slug: "gencpm"
    title_short: "GenCPM Toolbox"
    problem: "Standard connectome-based predictive modeling is mostly tailored to continuous outcomes."
    method: "A generalized CPM toolbox that supports binary, categorical, count, and survival outcomes."
    data: "Simulation studies and neuroimaging prediction use cases."
    contribution: "Makes flexible CPM analyses easier to run and reproduce."
    tags:
      - "software"
      - "connectomics"
      - "prediction"
  - slug: "subgroup-mediation-analysis"
    title_short: "Subgroup Mediation"
    problem: "Pooled mediation models can hide subgroup-specific indirect effects."
    method: "A mediation framework that estimates direct and indirect effects by subgroup."
    data: "Heterogeneous subgroup structures with distinct mediation patterns."
    contribution: "Tests whether mediation pathways differ across subgroups."
    tags:
      - "mediation"
      - "heterogeneity"
      - "inference"
  - slug: "distribution-on-scalar-single-index-quantile-regression"
    title_short: "DSQRM"
    problem: "Tumor imaging responses can remain heterogeneous even after standard alignment steps."
    method: "Distribution-on-scalar single-index quantile regression with estimation and inference."
    data: "TCIA glioblastoma imaging with scalar clinical covariates."
    contribution: "Relates scalar predictors to distributional imaging outcomes under heterogeneity."
    tags:
      - "tumor heterogeneity"
      - "distributional regression"
      - "quantiles"
  - slug: "confounder-adjustment-single-index-function-on-scalar-regression"
    title_short: "Function-on-Scalar Adjustment"
    problem: "Hidden imaging heterogeneity can distort function-on-scalar analyses."
    method: "Single-index function-on-scalar regression with latent confounder adjustment."
    data: "Simulation settings and ADNI diffusion tensor imaging."
    contribution: "Captures nonlinear effects while adjusting for unobserved confounding."
    tags:
      - "functional data"
      - "confounding"
      - "ADNI"
  - slug: "shape-mediation-alzheimers"
    title_short: "Shape Mediation"
    problem: "Shape-valued brain markers complicate mediation analysis in Alzheimer's disease studies."
    method: "Elastic shape representation with direct and indirect effect inference."
    data: "Shape-based neuroimaging markers in Alzheimer's disease settings."
    contribution: "Localizes mediation patterns on anatomy rather than scalar summaries alone."
    tags:
      - "shape analysis"
      - "mediation"
      - "Alzheimer's disease"
  - slug: "confounder-adjustment-shape-on-scalar-regression"
    title_short: "Shape-on-Scalar Adjustment"
    problem: "Shape-on-scalar regression can be biased by latent imaging confounders."
    method: "Confounder-adjusted shape-on-scalar modeling."
    data: "Corpus callosum shapes in Alzheimer's disease analyses."
    contribution: "Separates disease-related shape changes from hidden heterogeneity."
    tags:
      - "shape regression"
      - "confounding"
      - "corpus callosum"
  - slug: "quantifying-glioblastoma-growth-multimodal-mri"
    title_short: "Glioblastoma Growth"
    problem: "Single MRI summaries miss heterogeneous glioblastoma growth patterns."
    method: "Multimodal MRI-based tumor growth quantification."
    data: "Glioblastoma imaging study with complementary MRI modalities."
    contribution: "Builds richer growth characterization than single-modality summaries."
    tags:
      - "glioblastoma"
      - "multimodal MRI"
      - "tumor growth"
  - slug: "lmfe-partial-discharge-detection"
    title_short: "LMFE"
    problem: "Partial discharge detection needs features across pulse, phase, and measurement scales."
    method: "Learning-based multi-scale feature engineering with recurrent neural features."
    data: "Three-phase VSB ENET partial-discharge signals."
    contribution: "Improves fault detection on a highly imbalanced benchmark."
    tags:
      - "fault detection"
      - "feature engineering"
      - "RNN"
