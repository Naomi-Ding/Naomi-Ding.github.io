publications:
  - slug: "gradient-coupling-development-behavior-genetics"
    title: "Brain Functional-Structural Gradient Coupling Reflects Development, Behavior and Genetic Influences."
    authors: "Gao*, S., Gu*, Z., Ding*, S., Wang, G., Zhang, Z., Zhao, H., & Zhao, Y."
    year: 2026
    venue: "Nature Communications"
    status: "accepted"
    status_category: "accepted"
    authorship_role: "co-first author"
    topic: "Gradient Coupling; Neurodevelopment; Imaging Genetics"
    paper_url: "https://doi.org/10.1101/2025.09.16.25335918"
    code_url: "https://github.com/Zhao-team/SF-Gradient-Coupling"
    abstract_text: "Characterizes structural-functional gradient coupling across development using large multimodal neuroimaging cohorts. The study links coupling patterns to cognition, mental health, and genetic or molecular variation, with evidence of developmental refinement and sex-specific effects."
    graphical_abstract: "graphical-abstracts/gradient-coupling-development-behavior-genetics.svg"
    notes: ""
  - slug: "connectivity-to-shape-preclinical-alzheimers"
    title: "A Novel Bayesian Framework Uncovering Brain Connectivity-to-Shape Relationship in Preclinical Alzheimer's Disease."
    authors: "Ding, S., Johns, E., Orlichenko, A., Fredericks, C., & Zhao, Y."
    year: 2026
    venue: "Annals of Applied Statistics"
    status: "accepted"
    status_category: "accepted"
    authorship_role: "first author"
    topic: "Bayesian Neuroimaging; Connectivity-to-Shape Regression; Alzheimer's Disease"
    paper_url: ""
    code_url: "https://github.com/Naomi-Ding/COSR"
    abstract_text: "Develops the Bayesian Connectivity-on-Shape Regression (COSR) framework to relate vertex-level subcortical shape variation to functional connectivity in preclinical Alzheimer's disease while accounting for network modularity. The model combines relaxed-thresholded Gaussian process priors, stochastic block structure, and variational inference, and is demonstrated in simulations and A4 data."
    graphical_abstract: "graphical-abstracts/connectivity-to-shape-preclinical-alzheimers.svg"
    notes: ""
  - slug: "bayesian-monotone-single-index-quantile-regression"
    title: "Bayesian Monotone Single-Index Quantile Regression Model with Bounded Response and Misaligned Functional Covariates."
    authors: "Ding, S., Sinha, D., Hajcak, G., Kotov, R., & Huang, C."
    year: 2025
    venue: "Biometrics, 81(4), ujaf145"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "Bayesian Quantile Regression; Functional Covariates"
    paper_url: "https://doi.org/10.1093/biomtc/ujaf145"
    code_url: "https://github.com/Naomi-Ding/BMSQRM"
    abstract_text: "Develops a Bayesian monotone single-index quantile regression model for bounded outcomes with scalar and misaligned functional covariates. The framework yields interpretable nonlinear effects, keeps estimated quantiles within response bounds, and is evaluated in simulations and an adolescent depression study."
    graphical_abstract: "graphical-abstracts/bayesian-monotone-single-index-quantile-regression.svg"
    notes: ""
  - slug: "s-gmas"
    title: "S-GMAS: Genome-Wide Mediation Analysis With Brain Subcortical Shape Mediators."
    authors: "Ding, S., Liu, R., Srivastava, A., Nowakowski, R.S., Shen, L., Thompson, P.M., Zhang, H. and Huang, C."
    year: 2025
    venue: "Human Brain Mapping, 46(11), p.e70297"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "Imaging Genetics; Mediation Analysis; Brain Shape"
    paper_url: "http://doi.org/10.1002/hbm.70297"
    code_url: "https://github.com/Naomi-Ding/S-GMAS"
    abstract_text: "Introduces a genome-wide mediation workflow that studies brain subcortical shape as a mediator between genetic exposures and clinical outcomes. The pipeline combines GWAS screening, elastic shape representations, and bootstrap inference, and is demonstrated in ADNI corpus callosum data."
    graphical_abstract: "graphical-abstracts/s-gmas.svg"
    notes: ""
  - slug: "gencpm"
    title: "GenCPM: A Toolbox for Generalized Connectome-based Predictive Modeling."
    authors: "Xu, B., Ding, S., Xu, W., Fredericks, C., & Zhao, Y."
    year: 2025
    venue: "Frontiers in Neuroscience, 19, 1627497"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "Connectome Prediction; Neuroimaging Software"
    paper_url: "https://doi.org/10.3389/fnins.2025.1627497"
    code_url: "https://github.com/BXU69/GenCPM"
    abstract_text: "Introduces GenCPM, a software toolbox for generalized connectome-based predictive modeling beyond continuous outcomes. The package supports binary, categorical, count, and survival endpoints with covariate adjustment, and is illustrated through simulations and neuroimaging case studies."
    graphical_abstract: "graphical-abstracts/gencpm.svg"
    notes: ""
  - slug: "subgroup-mediation-analysis"
    title: "Subgroup Mediation Analysis."
    authors: "Lei, K., Ding, S., Li, L., & Huang, C."
    year: 2025
    venue: "Stat, 14(3), p.e70091"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "Subgroup Mediation; Heterogeneity"
    paper_url: "http://doi.org/10.1002/sta4.70091"
    code_url: ""
    abstract_text: "Develops a mediation framework for heterogeneous populations with subgroup-specific direct and indirect effects. The method replaces a single pooled mediation pattern with subgroup-aware estimation and testing."
    graphical_abstract: "graphical-abstracts/subgroup-mediation-analysis.svg"
    notes: ""
  - slug: "distribution-on-scalar-single-index-quantile-regression"
    title: "Distribution-on-scalar Single-index Quantile Regression Model for Handling Tumor Heterogeneity."
    authors: "Zhou*, X., Ding*, S., Wang, J., Liu, R., Kong, L., & Huang, C."
    year: 2025
    venue: "Technometrics, 67(2), 323-332"
    status: "published"
    status_category: "published"
    authorship_role: "co-first author"
    topic: "Distributional Regression; Tumor Imaging"
    paper_url: "http://doi.org/10.1080/00401706.2024.2441686"
    code_url: "https://github.com/Naomi-Ding/DSQRM"
    abstract_text: "Develops a distribution-on-scalar single-index quantile regression model for heterogeneous imaging outcomes when full alignment is unrealistic. The paper establishes estimation and inference procedures and evaluates the approach in simulations and TCIA glioblastoma imaging data."
    graphical_abstract: "graphical-abstracts/distribution-on-scalar-single-index-quantile-regression.svg"
    notes: ""
  - slug: "confounder-adjustment-single-index-function-on-scalar-regression"
    title: "Confounder adjustment in single index function-on-scalar regression model."
    authors: "Ding, S., Zhou, X., Lin, J., Liu, R., & Huang, C."
    year: 2024
    venue: "Electronic Journal of Statistics, 18(2), 5679-5714"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "Function-on-Scalar Regression; Confounder Adjustment"
    paper_url: "http://doi.org/10.1214/24-EJS2333"
    code_url: "https://github.com/Naomi-Ding/SI-FARM"
    abstract_text: "Develops a single-index function-on-scalar regression model that captures nonlinear associations while adjusting for latent confounding from imaging heterogeneity. The method is studied theoretically and demonstrated in simulations and diffusion tensor imaging data from ADNI."
    graphical_abstract: "graphical-abstracts/confounder-adjustment-single-index-function-on-scalar-regression.svg"
    notes: ""
  - slug: "shape-mediation-alzheimers"
    title: "Shape Mediation Analysis in Alzheimer's Disease Studies."
