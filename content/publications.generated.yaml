  - slug: "distribution-on-scalar-single-index-quantile-regression"
    title: "Distribution-on-scalar Single-index Quantile Regression Model for Handling Tumor Heterogeneity."
    authors: "Zhou*, X., Ding*, S., Wang, J., Liu, R., Kong, L., & Huang, C."
    year: 2025
    venue: "Technometrics, 67(2), 323-332"
    status: "published"
    status_category: "published"
    authorship_role: "co-first author"
    topic: "distributional regression; tumor heterogeneity"
    paper_url: "http://doi.org/10.1080/00401706.2024.2441686"
    code_url: "http://github.com/Naomi-Ding/DSQRM"
    abstract_text: "Develops a distribution-on-scalar single-index quantile regression framework for imaging responses with heterogeneity, avoiding the usual assumption that images are fully aligned after preprocessing. The paper establishes estimation and inference procedures and evaluates them with simulations and TCIA glioblastoma imaging data."
    graphical_abstract: "graphical-abstracts/distribution-on-scalar-single-index-quantile-regression.svg"
    notes: "Equal contribution noted in CV. The existing code URL was preserved from prior site content but could not be re-verified automatically."
  - slug: "confounder-adjustment-single-index-function-on-scalar-regression"
    title: "Confounder adjustment in single index function-on-scalar regression model."
    authors: "Ding, S., Zhou, X., Lin, J., Liu, R., & Huang, C."
    year: 2024
    venue: "Electronic Journal of Statistics, 18(2), 5679-5714"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "function-on-scalar regression; confounder adjustment"
    paper_url: "http://doi.org/10.1214/24-EJS2333"
    code_url: "http://github.com/Naomi-Ding/SI-FARM"
    abstract_text: "Proposes a single-index function-on-scalar regression model that captures nonlinear associations while adjusting for latent confounding induced by imaging heterogeneity. The paper develops estimation and inference theory, studies asymptotic properties, and demonstrates the method with simulations and diffusion tensor imaging data from ADNI."
