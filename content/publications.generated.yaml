publications:
  - slug: "connectivity-to-shape-preclinical-alzheimers"
    title: "A Novel Bayesian Framework Uncovering Brain Connectivity-to-Shape Relationship in Preclinical Alzheimer's Disease."
    authors: "Ding, S., Johns, E., Orlichenko, A., Fredericks, C., & Zhao, Y."
    year: 2026
    venue: "Annals of Applied Statistics"
    status: "accepted"
    status_category: "accepted"
    authorship_role: "first author"
    topic: "Bayesian neuroimaging; connectivity-to-shape regression; Alzheimer's disease"
    paper_url: ""
    code_url: ""
    abstract_text: "Introduces the Bayesian Connectivity-on-Shape Regression (COSR) model to relate vertex-level subcortical shape variation to functional connectivity in preclinical Alzheimer's disease while accounting for network modularity. The framework combines a relaxed-thresholded Gaussian process prior, a stochastic block model, and variational inference, then shows strong simulation performance and biologically meaningful structure-function associations in A4 data."
    graphical_abstract: "graphical-abstracts/connectivity-to-shape-preclinical-alzheimers.svg"
    notes: "Accepted manuscript available locally; no public paper link was verified during this pass."
  - slug: "gradient-coupling-development-behavior-genetics"
    title: "Brain Functional-Structural Gradient Coupling Reflects Development, Behavior and Genetic Influences."
    authors: "Gao*, S., Gu*, Z., Ding*, S., Wang, G., Zhang, Z., Zhao, H., & Zhao, Y."
    year: 2026
    venue: "Nature Communications"
    status: "accepted"
    status_category: "accepted"
    authorship_role: "co-first author"
    topic: "structural-functional brain gradients; development; behavior; genetics"
    paper_url: "https://doi.org/10.1101/2025.09.16.25335918"
    code_url: ""
    abstract_text: "Analyzes structural-functional gradient coupling across childhood and adulthood using large multimodal neuroimaging cohorts, showing developmental refinement, sex-specific patterns, and broad links to cognition, mental health, and molecular or genetic variation."
    graphical_abstract: "graphical-abstracts/gradient-coupling-development-behavior-genetics.svg"
    notes: "Equal contribution noted in CV; public preprint DOI verified."
  - slug: "bayesian-monotone-single-index-quantile-regression"
    title: "Bayesian Monotone Single-Index Quantile Regression Model with Bounded Response and Misaligned Functional Covariates."
    authors: "Ding, S., Sinha, D., Hajcak, G., Kotov, R., & Huang, C."
    year: 2025
    venue: "Biometrics, 81(4), ujaf145"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "Bayesian quantile regression; functional covariates"
    paper_url: "https://doi.org/10.1093/biomtc/ujaf145"
    code_url: ""
    abstract_text: "Develops a Bayesian monotone single-index quantile regression model for bounded outcomes with both scalar and misaligned functional covariates. The method builds an interpretable nonlinear index, keeps estimated quantiles within response bounds, jointly handles functional registration, and performs well in simulations and an adolescent depression application."
    graphical_abstract: "graphical-abstracts/bayesian-monotone-single-index-quantile-regression.svg"
    notes: ""
  - slug: "s-gmas"
    title: "S-GMAS: Genome-Wide Mediation Analysis With Brain Subcortical Shape Mediators."
    authors: "Ding, S., Liu, R., Srivastava, A., Nowakowski, R.S., Shen, L., Thompson, P.M., Zhang, H. and Huang, C."
    year: 2025
    venue: "Human Brain Mapping, 46(11), p.e70297"
    status: "published"
    status_category: "published"
    authorship_role: "first author"
    topic: "imaging genetics; mediation analysis; brain shape"
    paper_url: "http://doi.org/10.1002/hbm.70297"
    code_url: "http://github.com/Naomi-Ding/S-GMAS"
    abstract_text: "Presents a genome-wide mediation workflow for studying brain subcortical shape as a mediator between genetic exposures and clinical outcomes. The method combines GWAS screening, square-root velocity function representations for shape, shape mediation modeling, and bootstrap inference, then demonstrates the approach on ADNI corpus callosum data."
    graphical_abstract: "graphical-abstracts/s-gmas.svg"
    notes: ""
  - slug: "gencpm"
    title: "GenCPM: A Toolbox for Generalized Connectome-based Predictive Modeling."
    authors: "Xu, B., Ding, S., Xu, W., Fredericks, C., & Zhao, Y."
    year: 2025
    venue: "Frontiers in Neuroscience, 19, 1627497"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "connectome-based predictive modeling; neuroimaging software"
    paper_url: "https://doi.org/10.3389/fnins.2025.1627497"
    code_url: "http://github.com/BXU69/GenCPM"
    abstract_text: "Introduces GenCPM, a software toolbox for generalized connectome-based predictive modeling that extends the standard CPM workflow beyond continuous outcomes. The package supports binary, categorical, count, and survival endpoints, incorporates covariates, and is demonstrated through simulations and neuroimaging case studies."
    graphical_abstract: "graphical-abstracts/gencpm.svg"
    notes: ""
  - slug: "subgroup-mediation-analysis"
    title: "Subgroup Mediation Analysis."
    authors: "Lei, K., Ding, S., Li, L., & Huang, C."
    year: 2025
    venue: "Stat, 14(3), p.e70091"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "mediation analysis"
    paper_url: "http://doi.org/10.1002/sta4.70091"
    code_url: ""
