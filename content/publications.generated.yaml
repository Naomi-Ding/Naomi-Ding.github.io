  - slug: "lmfe-partial-discharge-detection"
    title: "LMFE: Learning-based Multi-scale Feature Engineering in Partial Discharge Detection."
    authors: "Huang, C., Ding, S., Li, S., & Liu, R."
    year: 2022
    venue: "IEEE Transactions on Neural Networks and Learning Systems, 35(5), pp.5848-5856"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "Machine Learning; Feature Engineering; Fault Detection"
    paper_url: "https://ieeexplore.ieee.org/document/9967788/"
    code_url: "https://github.com/Naomi-Ding/LMFE"
