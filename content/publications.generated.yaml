    year: 2024
    venue: "Statistics in Medicine"
    status: "published"
    status_category: "published"
    authorship_role: "co-author"
    topic: "Shape Mediation; Alzheimer's Disease"
    paper_url: "http://doi.org/10.1002/sim.10265"
    code_url: ""
    abstract_text: "Introduces a mediation framework for shape-valued brain markers in Alzheimer's disease studies. The approach combines elastic shape representations with inference on direct and indirect effects to localize clinically relevant mediation patterns."
    graphical_abstract: "graphical-abstracts/shape-mediation-alzheimers.svg"
    notes: ""
  - slug: "confounder-adjustment-shape-on-scalar-regression"
