  - "Functional, shape, and distributional data analysis"
  - "Statistical neuroimaging and imaging genetics"
  - "Multimodal data fusion"
  - "Disease network and hypergraph modeling"
featured_topics:
  - title: "Probabilistic modeling for multimorbidity in longitudinal health data"
    description: "Bayesian models for multimorbidity, latent disease pathways, and survival in longitudinal EHR data."
    image: "figures/bayesian-hypergraph-inference.png"
    image_alt: "Bayesian hypergraph schematic representing latent disease pathways in longitudinal health data."
  - title: "Statistical neuroimaging and imaging genetics"
    description: "Statistical methods for neuroimaging and imaging genetics, linking brain shape, connectivity, development, and genetic variation."
    image: "figures/gradient-coupling.png"
    image_alt: "Representative figure for structural-functional gradient coupling across development, behavior, and genetic influences."
  - title: "Functional, shape, and distributional modeling"
    description: "Statistical modeling for functional, shape, and distributional outcomes, including single-index, quantile, and confounder-adjusted methods."
    image: "figures/DSQRM.png"
    image_alt: "Representative DSQRM figure for distributional regression in heterogeneous imaging data."
  - title: "Multiscale learning and signal modeling"
    description: "Applied machine learning pipelines for multimodal prediction, feature engineering, and signal detection in real-world systems."
    image: "figures/LMFE.png"
    image_alt: "Representative figure for learning-based multi-scale feature engineering in partial discharge detection."
