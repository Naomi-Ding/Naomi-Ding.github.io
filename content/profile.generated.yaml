short_bio: "Since July 2024, I have been a Postdoctoral Associate in the Department of Biostatistics at Yale University, working with Dr. Yize Zhao. I earned my PhD in Statistics from Florida State University under the supervision of Dr. Chao Huang. My research lies at the intersection of Bayesian methodology, scalable computation, and biomedical data science. I develop interpretable probabilistic models for complex, high-dimensional, and structured data, with particular interests in uncertainty quantification, variational inference, functional, shape, and distributional data analysis, statistical neuroimaging and imaging genetics, multimodal data fusion, and disease network and hypergraph modeling for longitudinal health data."
