short_bio: "Shengxian Ding is a Postdoctoral Associate in the Department of Biostatistics at Yale University. Her research focuses on Bayesian statistics, functional and shape data analysis, neuroimaging, disease progression modeling, and multimodal biomedical data integration, with recent work spanning preclinical Alzheimer's disease, brain connectivity, and latent disease pathways."
research_interests:
  - "Bayesian statistics"
  - "functional and shape data analysis"
  - "neuroimaging"
  - "disease progression modeling"
  - "multimodal data integration"
featured_topics:
  - title: "Bayesian neuroimaging models"
    description: "Bayesian regression, graph, and variational-inference methods for relating brain structure, function, and disease risk."
  - title: "Functional and shape data analysis"
    description: "Single-index, quantile-regression, and mediation frameworks for complex functional and shape-valued biomedical outcomes."
  - title: "Alzheimer's disease studies"
    description: "Methods and applications for preclinical Alzheimer's disease, including subcortical shape, connectivity, and multimodal biomarkers."
  - title: "High-dimensional biomedical data"
    description: "Scalable modeling pipelines for EHR, neuroimaging, genetic, and other high-dimensional datasets."
