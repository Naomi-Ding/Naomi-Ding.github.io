short_bio: "Shengxian Ding is a Postdoctoral Associate in the Department of Biostatistics at Yale University, where she is mentored by Dr. Yize Zhao. She received her PhD in Statistics from Florida State University under the supervision of Dr. Chao Huang. Her research centers on Bayesian statistics, functional and shape data analysis, neuroimaging, and imaging genetics, with much of her work focused on Alzheimer's disease. Recent projects extend this agenda to multimodal biomedical data integration and Bayesian disease-hypergraph modeling for longitudinal EHR data."
