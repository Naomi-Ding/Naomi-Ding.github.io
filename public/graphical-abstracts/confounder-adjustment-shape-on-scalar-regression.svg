  <title id="confounder-adjustment-shape-on-scalar-regression-title">Confounder Adjustment in Shape-on-Scalar Regression Model: Corpus Callosum Shape Alterations in Alzheimer&apos;s Disease.</title>
  <desc id="confounder-adjustment-shape-on-scalar-regression-desc">Graphical abstract summarizing the problem, method, application, and contribution for Confounder Adjustment in Shape-on-Scalar Regression Model: Corpus Callosum Shape Alterations in Alzheimer&apos;s Disease..</desc>
