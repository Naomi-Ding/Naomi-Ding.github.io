      <text x="88" y="282" class="panel-text"><tspan x="88" dy="0">Shape-on-scalar</tspan><tspan x="88" dy="24">regression can be biased</tspan><tspan x="88" dy="24">by latent imaging</tspan><tspan x="88" dy="24">confounders.</tspan></text>
