<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="gradient-coupling-development-behavior-genetics-title gradient-coupling-development-behavior-genetics-desc">
  <title id="gradient-coupling-development-behavior-genetics-title">Brain Functional-Structural Gradient Coupling Reflects Development, Behavior and Genetic Influences.</title>
  <desc id="gradient-coupling-development-behavior-genetics-desc">Graphical abstract summarizing the problem, method, application, and contribution for Brain Functional-Structural Gradient Coupling Reflects Development, Behavior and Genetic Influences..</desc>
