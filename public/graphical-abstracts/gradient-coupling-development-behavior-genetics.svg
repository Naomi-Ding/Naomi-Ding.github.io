  </style>
  <text x="64" y="54" class="kicker">Graphical abstract</text>
  <text x="64" y="98" class="title"><tspan x="64" dy="0">Gradient Coupling</tspan></text>
  <text x="64" y="148" class="subtitle"><tspan x="64" dy="0">structural-functional brain gradients; development;...</tspan></text>
  
    <line x1="314" y1="358" x2="350" y2="358" stroke="#7A9ABE" stroke-width="3" stroke-linecap="round" />
    <line x1="600" y1="358" x2="636" y2="358" stroke="#7A9ABE" stroke-width="3" stroke-linecap="round" />
    <line x1="886" y1="358" x2="922" y2="358" stroke="#7A9ABE" stroke-width="3" stroke-linecap="round" />
  
  
    <g>
      <rect x="64" y="208" width="250" height="340" rx="22" fill="#F4F7FB" stroke="#C9D8E8" />
      <text x="88" y="244" class="panel-label">Problem</text>
      <text x="88" y="282" class="panel-text"><tspan x="88" dy="0">How structural and</tspan><tspan x="88" dy="24">functional brain</tspan><tspan x="88" dy="24">gradients couple across</tspan><tspan x="88" dy="24">development remains</tspan><tspan x="88" dy="24">unclear.</tspan></text>
    </g>
  
    <g>
      <rect x="350" y="208" width="250" height="340" rx="22" fill="#EDF3F9" stroke="#C9D8E8" />
      <text x="374" y="244" class="panel-label">Method</text>
      <text x="374" y="282" class="panel-text"><tspan x="374" dy="0">Multi-scale coupling</tspan><tspan x="374" dy="24">metrics derived from</tspan><tspan x="374" dy="24">structural and functional</tspan><tspan x="374" dy="24">connectivity.</tspan></text>
    </g>
  
    <g>
      <rect x="636" y="208" width="250" height="340" rx="22" fill="#F4F7FB" stroke="#C9D8E8" />
      <text x="660" y="244" class="panel-label">Application</text>
      <text x="660" y="282" class="panel-text"><tspan x="660" dy="0">ABCD children and HCP</tspan><tspan x="660" dy="24">adults with multimodal</tspan><tspan x="660" dy="24">neuroimaging.</tspan></text>
    </g>
  
    <g>
      <rect x="922" y="208" width="250" height="340" rx="22" fill="#EDF3F9" stroke="#C9D8E8" />
      <text x="946" y="244" class="panel-label">Contribution</text>
      <text x="946" y="282" class="panel-text"><tspan x="946" dy="0">Shows developmental</tspan><tspan x="946" dy="24">refinement and links to</tspan><tspan x="946" dy="24">cognition, mental health,</tspan><tspan x="946" dy="24">and genetics.</tspan></text>
    </g>
  
  
