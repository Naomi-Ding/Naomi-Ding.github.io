<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian hypergraph inference overview</title>
  <desc id="desc">A three-panel schematic showing patient covariates and disease outcomes feeding a latent hypergraph layer and shared effect propagation, with lower boxes summarizing structured variational inference, hyperedge existence, disease membership, and risk-modulated hyperedge effects.</desc>
  <defs>
    <linearGradient id="panelFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f7fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8ea3"/>
    </marker>
    <style>
      .panel-title { font: 700 24px Aptos, Segoe UI, sans-serif; fill: #223247; }
      .label { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #223247; }
      .small { font: 500 14px Aptos, Segoe UI, sans-serif; fill: #536171; }
      .box { fill: url(#panelFill); stroke: #cfd9e6; stroke-width: 2; rx: 18; ry: 18; }
      .header { fill: #ececec; rx: 14; ry: 14; }
      .disease { fill: #d99a9a; stroke: #a87070; stroke-width: 2; }
      .latent { fill: #355b9d; stroke: #25416f; stroke-width: 2; }
      .flow { fill: none; stroke: #7f8ea3; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f7f9fc"/>

  <rect class="header" x="20" y="20" width="480" height="54"/>
  <rect class="header" x="560" y="20" width="480" height="54"/>
  <rect class="header" x="1100" y="20" width="480" height="54"/>
  <text class="panel-title" x="260" y="56" text-anchor="middle">(a) Data layer</text>
  <text class="panel-title" x="800" y="56" text-anchor="middle">(b) Latent hypergraph layer</text>
  <text class="panel-title" x="1340" y="56" text-anchor="middle">(c) Effect propagation</text>

  <text class="label" x="80" y="150">Patients</text>
  <text class="small" x="80" y="176">i = 1, ..., n</text>
  <g transform="translate(180 105)">
    <circle cx="25" cy="20" r="12" fill="#9aa5b2"/>
    <circle cx="55" cy="20" r="12" fill="#9aa5b2"/>
    <circle cx="85" cy="20" r="12" fill="#9aa5b2"/>
    <circle cx="115" cy="20" r="12" fill="#c78484"/>
    <circle cx="145" cy="20" r="12" fill="#9aa5b2"/>
    <circle cx="40" cy="52" r="12" fill="#9aa5b2"/>
    <circle cx="70" cy="52" r="12" fill="#9aa5b2"/>
    <circle cx="100" cy="52" r="12" fill="#9aa5b2"/>
    <circle cx="130" cy="52" r="12" fill="#9aa5b2"/>
  </g>

  <rect class="box" x="30" y="210" width="220" height="180"/>
  <rect class="box" x="290" y="210" width="220" height="180"/>
  <text class="label" x="140" y="265" text-anchor="middle">Covariates x_i</text>
  <text class="small" x="140" y="300" text-anchor="middle">Age, sex, BMI, genetics, lifestyle</text>
  <text class="label" x="400" y="265" text-anchor="middle">Disease outcomes y_iv</text>
  <g>
    <circle class="disease" cx="350" cy="320" r="26"/>
    <circle class="disease" cx="410" cy="320" r="26"/>
    <circle class="disease" cx="470" cy="320" r="26"/>
    <circle class="disease" cx="380" cy="365" r="26"/>
    <circle class="disease" cx="440" cy="365" r="26"/>
    <text class="label" x="350" y="327" text-anchor="middle">A</text>
    <text class="label" x="410" y="327" text-anchor="middle">B</text>
    <text class="label" x="470" y="327" text-anchor="middle">C</text>
    <text class="label" x="380" y="372" text-anchor="middle">D</text>
    <text class="label" x="440" y="372" text-anchor="middle">E</text>
  </g>

  <path class="flow" d="M 250 180 C 270 215, 290 225, 320 240"/>
  <path class="flow" d="M 250 180 C 285 225, 345 230, 390 240"/>
  <path class="flow" d="M 520 300 C 560 300, 590 300, 615 300"/>

  <text class="small" x="650" y="132">Hyperedge 1</text>
  <text class="small" x="645" y="154">Cardio-metabolic cluster</text>
  <text class="small" x="905" y="146">Latent disease clusters</text>
  <text class="small" x="1025" y="195">Risk-factor-specific</text>

  <ellipse cx="775" cy="260" rx="190" ry="120" fill="rgba(53,91,157,0.14)" stroke="#5e7eb4" stroke-width="3"/>
  <ellipse cx="720" cy="330" rx="115" ry="145" fill="rgba(134,176,139,0.14)" stroke="#6aa072" stroke-width="3" stroke-dasharray="10 8"/>
  <ellipse cx="935" cy="305" rx="115" ry="105" fill="rgba(231,170,92,0.16)" stroke="#d49b4f" stroke-width="3"/>

  <g>
    <circle class="latent" cx="740" cy="220" r="34"/>
    <circle class="latent" cx="670" cy="285" r="34"/>
    <circle class="latent" cx="845" cy="270" r="34"/>
    <circle class="latent" cx="710" cy="350" r="34"/>
    <circle class="latent" cx="955" cy="340" r="34"/>
    <text class="label" x="740" y="228" text-anchor="middle" fill="#ffffff">B</text>
    <text class="label" x="670" y="293" text-anchor="middle" fill="#ffffff">A</text>
    <text class="label" x="845" y="278" text-anchor="middle" fill="#ffffff">C</text>
    <text class="label" x="710" y="358" text-anchor="middle" fill="#ffffff">D</text>
    <text class="label" x="955" y="348" text-anchor="middle" fill="#ffffff">E</text>
  </g>

  <text x="645" y="405" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#5f8c68">Hyperedge 2</text>
  <text x="960" y="400" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#d08937">Hyperedge 3</text>
  <text x="820" y="435" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#7b63b4">Posterior uncertainty</text>

  <path class="flow" d="M 1030 300 C 1065 300, 1090 300, 1125 300"/>

  <rect class="box" x="1220" y="120" width="210" height="95"/>
  <text class="label" x="1325" y="162" text-anchor="middle">Covariate j</text>
  <circle cx="1325" cy="188" r="15" fill="#9aa5b2"/>

  <rect class="box" x="1180" y="245" width="290" height="115" fill="#eef4fb"/>
  <text class="label" x="1325" y="287" text-anchor="middle">Hyperedge e</text>
  <text class="small" x="1325" y="312" text-anchor="middle">Shared effect</text>
  <text class="small" x="1110" y="270">+/- posterior uncertainty</text>
  <text class="small" x="1115" y="355">disease-specific + shared</text>

  <path class="flow" d="M 1325 215 L 1325 244"/>
  <path class="flow" d="M 1260 360 L 1235 430"/>
  <path class="flow" d="M 1325 360 L 1325 430"/>
  <path class="flow" d="M 1390 360 L 1415 430"/>

  <g>
    <circle class="disease" cx="1235" cy="460" r="28"/>
    <circle class="disease" cx="1325" cy="460" r="28"/>
    <circle class="disease" cx="1415" cy="460" r="28"/>
    <text class="label" x="1235" y="468" text-anchor="middle">A</text>
    <text class="label" x="1325" y="468" text-anchor="middle">B</text>
    <text class="label" x="1415" y="468" text-anchor="middle">C</text>
    <text class="label" x="1325" y="525" text-anchor="middle">Diseases A, B, C</text>
  </g>

  <rect class="box" x="40" y="585" width="430" height="220"/>
  <text class="label" x="255" y="635" text-anchor="middle">Structured Variational Inference</text>
  <text class="small" x="255" y="678" text-anchor="middle">Interpretable disease clusters</text>
  <text class="small" x="255" y="710" text-anchor="middle">Uncertainty-aware risk-factor-modulated pathways</text>
  <text class="small" x="255" y="742" text-anchor="middle">Redundancy control via repulsion</text>

  <rect class="box" x="540" y="585" width="165" height="170"/>
  <rect class="box" x="720" y="585" width="165" height="170"/>
  <rect class="box" x="900" y="585" width="165" height="170"/>
  <text class="label" x="622" y="622" text-anchor="middle">Hyperedge existence</text>
  <text class="label" x="802" y="622" text-anchor="middle">Disease membership</text>
  <text class="label" x="982" y="622" text-anchor="middle">Risk-modulated effect</text>
  <text class="small" x="622" y="690" text-anchor="middle">Distinct latent clusters</text>
  <text class="small" x="802" y="690" text-anchor="middle">Shared and specific membership</text>
  <text class="small" x="982" y="690" text-anchor="middle">Repulsion avoids overlap</text>

  <rect class="box" x="1120" y="585" width="430" height="220"/>
  <text class="label" x="1335" y="635" text-anchor="middle">Risk-modulated hyperedge effect</text>
  <text x="1335" y="700" text-anchor="middle" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-style="italic" font-weight="700" fill="#2f6c8f">Repulsion prior avoids overlapping hyperedges.</text>
</svg>
